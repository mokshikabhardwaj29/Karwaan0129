<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Someone made a bloom for you ✦ KARWAAN</title>
  <meta name="description" content="A bloom was made for you on KARWAAN — Where Poetry Finds Its Path." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─── */
    :root {
      --cream:    #F7F4EF;
      --sage:     #DDE6E1;
      --rose:     #EAD7D7;
      --lavender: #E6E0F2;
      --charcoal: #2E2E2E;
      --mid:      #5a5a5a;
      --border:   rgba(46,46,46,0.11);
      --ease:     cubic-bezier(0.25,0.46,0.45,0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── PETAL CANVAS ─── */
    #petal-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* ─── PAGE LAYOUT ─── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1.5rem 4rem;
      gap: 0;
    }

    /* ─── TOP BADGE ─── */
    .bloom-eyebrow {
      font-style: italic;
      font-size: clamp(0.65rem, 2.5vw, 0.85rem);
      letter-spacing: 0.24em;
      color: var(--mid);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: riseIn 0.9s var(--ease) 0.2s forwards;
    }

    .bloom-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 3.8rem);
      font-weight: 300;
      text-align: center;
      line-height: 1;
      color: var(--charcoal);
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: riseIn 1s var(--ease) 0.35s forwards;
    }

    .bloom-sub {
      font-style: italic;
      font-size: clamp(0.85rem, 3vw, 1.1rem);
      color: var(--mid);
      text-align: center;
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: riseIn 1s var(--ease) 0.5s forwards;
    }

    /* ─── THE CARD ─── */
    .bloom-card-wrap {
      width: min(320px, calc(100vw - 3rem));
      aspect-ratio: 9 / 16;
      flex-shrink: 0;
      opacity: 0;
      animation: bloomCardIn 1.1s cubic-bezier(0.34, 1.3, 0.64, 1) 0.7s forwards;
      filter: drop-shadow(0 24px 64px rgba(46,46,46,0.18));
      position: relative;
    }

    .bloom-card {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #F7F4EF;
      isolation: isolate;
    }

    /* flowers container */
    .bloom-flowers {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bloom-flower {
      position: absolute;
      pointer-events: none;
      transform-origin: center center;
      opacity: 0;
      transform: scale(0.3);
      transition: opacity 0.6s var(--ease), transform 0.6s var(--ease);
      will-change: transform, opacity;
    }
    .bloom-flower.appeared {
      opacity: 1;
      transform: scale(1) rotate(var(--frot));
    }

    /* text overlay */
    .bloom-text-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10% 8% 12%;
      pointer-events: none;
    }

    .bloom-poem {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
      color: #2E2E2E;
    }

    .bloom-sender {
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.12em;
      color: rgba(46,46,46,0.55);
      margin-top: 1em;
      max-width: 100%;
      word-break: break-word;
    }

    /* ─── DIVIDER ─── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 2.2rem auto 0;
      opacity: 0;
      animation: riseIn 0.7s ease 1.6s forwards;
    }

    /* ─── FOOTER CTA ─── */
    .bloom-footer {
      margin-top: 1.8rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: riseIn 0.8s ease 1.7s forwards;
    }

    .footer-prompt {
      font-style: italic;
      font-size: clamp(0.88rem, 3vw, 1.05rem);
      color: var(--mid);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    .btn-create {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.82rem, 2.8vw, 0.96rem);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.85em 2.4em;
      background: var(--charcoal);
      color: var(--cream);
      border: 1.5px solid var(--charcoal);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
      transition: color 0.35s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn-create::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--rose);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
      z-index: 0;
    }
    .btn-create:hover::before { transform: scaleX(1); }
    .btn-create:hover { color: var(--charcoal); }
    .btn-create span { position: relative; z-index: 1; }

    .karwaan-sig {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      opacity: 0.5;
      margin-top: 0.5rem;
    }

    /* ─── ERROR STATE ─── */
    .bloom-error {
      text-align: center;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }
    .bloom-error h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
    }
    .bloom-error p {
      font-style: italic;
      color: var(--mid);
      font-size: 1rem;
      line-height: 1.7;
    }

    /* ─── LOADING ─── */
    .bloom-loading {
      text-align: center;
      padding: 6rem 2rem;
      font-style: italic;
      color: var(--mid);
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: riseIn 0.6s ease 0.1s forwards;
    }

    /* ─── CONFETTI CANVAS ─── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ─── "HI, I WROTE THIS FOR YOU" ─── */
    .written-for-you {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 4.5vw, 1.7rem);
      font-weight: 400;
      color: var(--charcoal);
      text-align: center;
      letter-spacing: 0.03em;
      margin-bottom: 2rem;
      opacity: 0;
      animation: riseIn 1s var(--ease) 0.55s forwards;
    }
    .written-for-you::after {
      content: '';
      display: block;
      width: 0;
      height: 1.5px;
      background: var(--rose);
      margin: 0.35em auto 0;
      animation: underlineGrow 0.8s var(--ease) 1.4s forwards;
    }
    @keyframes underlineGrow {
      from { width: 0; }
      to   { width: 60%; }
    }

    /* ─── ANIMATIONS ─── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bloomCardIn {
      from { opacity: 0; transform: scale(0.88) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 480px) {
      .page { padding: 2.2rem 1rem 3.5rem; }
      .bloom-card-wrap { width: min(280px, calc(100vw - 2rem)); }
    }
  </style>
</head>
<body>

<canvas id="petal-canvas" aria-hidden="true"></canvas>
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<div class="page" id="page">
  <div class="bloom-loading" id="loading-state">✦ &nbsp;Opening your bloom…</div>
</div>

<script>
'use strict';

/* ─── SHARED CONFIG (must match script.js) ─── */
const FLOWER_COUNT = 15;
const BACKGROUNDS = [
  { id:'cream',    label:'Parchment', color:'#F7F4EF', dark:false },
  { id:'rose',     label:'Blush',     color:'#F5EAEA', dark:false },
  { id:'sage',     label:'Sage',      color:'#E8EFEB', dark:false },
  { id:'lavender', label:'Lavender',  color:'#EDE8F5', dark:false },
  { id:'warm',     label:'Warm',      color:'#F4EDE3', dark:false },
  { id:'pearl',    label:'Pearl',     color:'#FAF2F0', dark:false },
  { id:'midnight', label:'Midnight',  color:'#272330', dark:true  },
  { id:'forest',   label:'Forest',    color:'#2B3A2D', dark:true  },
];

/* ─── PETAL ANIMATION ─── */
function initPetals(bgDark) {
  const cv  = document.getElementById('petal-canvas');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  let W, H;
  const petals = [];
  const COLS = bgDark
    ? ['#4a3f5c','#3d4f3f','#5c4a4a','#4a4a6a','#5a4a3a']
    : ['#EAD7D7','#E6E0F2','#DDE6E1','#F5DDD5','#F0E8E3'];

  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }

  class Petal {
    constructor(init) {
      this.x   = Math.random() * W;
      this.y   = init ? Math.random() * H : -10;
      this.r   = 4 + Math.random() * 6;
      this.vx  = (Math.random() - .5) * .7;
      this.vy  = .4 + Math.random() * .6;
      this.rot = Math.random() * Math.PI * 2;
      this.vr  = (Math.random() - .5) * .035;
      this.col = COLS[Math.floor(Math.random() * COLS.length)];
      this.a   = .3 + Math.random() * .35;
    }
    tick() {
      this.x += this.vx + Math.sin(Date.now() * .001 + this.y * .01) * .25;
      this.y += this.vy;
      this.rot += this.vr;
      if (this.y > H + 20) return new Petal(false);
      return this;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.a;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillStyle = this.col;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.r, this.r * .5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  resize();
  addEventListener('resize', resize);
  for (let i = 0; i < 28; i++) petals.push(new Petal(true));
  (function loop() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < petals.length; i++) {
      petals[i] = petals[i].tick();
      petals[i].draw();
    }
    requestAnimationFrame(loop);
  })();
}

/* ─── FLOWER ARRANGE ZONES (matches script.js doArrange) ─── */
const ZONES = [
  {x:50, y:12, sx:32, sy:9 },
  {x:50, y:88, sx:32, sy:9 },
  {x:9,  y:50, sx:7,  sy:28},
  {x:91, y:50, sx:7,  sy:28},
  {x:18, y:22, sx:12, sy:12},
  {x:82, y:22, sx:12, sy:12},
  {x:18, y:78, sx:12, sy:12},
  {x:82, y:78, sx:12, sy:12},
  {x:36, y:9,  sx:14, sy:8 },
  {x:64, y:9,  sx:14, sy:8 },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function range(from, to) {
  return Array.from({ length: to - from + 1 }, (_, i) => from + i);
}

/* ─── DECODE BLOOM DATA ─── */
function decodeBloom() {
  // Support both ?b= (new) and #bloom= (legacy)
  const params  = new URLSearchParams(location.search);
  const encoded = params.get('b') || (() => {
    const h = location.hash;
    return h.startsWith('#bloom=') ? h.slice(7) : null;
  })();

  if (!encoded) return null;

  try {
    return JSON.parse(decodeURIComponent(escape(atob(encoded))));
  } catch(_) {
    return null;
  }
}

/* ─── BUILD THE BLOOM PAGE ─── */
function buildPage(data) {
  const bg     = BACKGROUNDS.find(b => b.id === data.b) || BACKGROUNDS[0];
  const poem   = data.p || '';
  const sender = data.s || '';
  const align  = data.a || 'center';
  const fSize  = data.f || 20;
  const isDark = bg.dark;

  const tc = isDark ? '#F7F4EF'               : '#2E2E2E';
  const sc = isDark ? 'rgba(247,244,239,0.6)' : 'rgba(46,46,46,0.55)';

  // ✦ Use encoded flower layout if present, otherwise fall back to random
  let flowerData;
  if (data.fl && data.fl.length > 0) {
    // Exact layout sent by the creator
    flowerData = data.fl.map((f, i) => ({
      src:      f.src,
      xPct:     f.x,
      yPct:     f.y,
      sizePct:  f.sz,
      rot:      f.r,
      zIndex:   f.z || (10 + i),
    }));
  } else {
    // Legacy fallback: random arrangement
    const picks = shuffle(range(1, FLOWER_COUNT)).slice(0, 8);
    flowerData = picks.map((n, i) => {
      const z       = ZONES[i % ZONES.length];
      const sizePct = 13 + (((n * 7 + i * 13) % 100) / 100) * 11;
      const xPct    = z.x + ((((n + i) % 100) / 100) - .5) * z.sx - sizePct / 2;
      const yPct    = z.y + ((((n * 3 + i) % 100) / 100) - .5) * z.sy - sizePct / 2;
      const rot     = ((n * 11 + i * 17) % 60) - 30;
      return { src: `assets/f${n}.png`, xPct, yPct, sizePct, rot, zIndex: 10 + i };
    });
  }

  const page = document.getElementById('page');
  page.innerHTML = `
    <p class="bloom-eyebrow">Jashn-e-Thehrav · KARWAAN</p>
    <h1 class="bloom-heading">Your Bloom ✦</h1>
    <p class="written-for-you">Hi, I wrote this for you ✦</p>

    <div class="bloom-card-wrap" id="bloom-card-wrap">
      <div class="bloom-card" id="bloom-card" style="background:${bg.color};">
        <div class="bloom-flowers" id="bloom-flowers"></div>
        <div class="bloom-text-layer">
          <div class="bloom-poem" id="bloom-poem"
            style="font-size:clamp(8px, calc(var(--card-h, 480px) * ${fSize * 0.0012}), 32px);
                   text-align:${align};
                   color:${tc};"
          >${escHtml(poem)}</div>
          <div class="bloom-sender"
            style="font-size:clamp(7px, calc(var(--card-h, 480px) * ${fSize * 0.0012 * 0.68}), 22px);
                   text-align:${align};
                   color:${sc};"
          >${sender ? escHtml('— ' + sender) : ''}</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bloom-footer">
      <p class="footer-prompt">Touched by these words?<br>Make your own bloom.</p>
      <a class="btn-create" href="index.html"><span>Create Your Bloom</span></a>
      <p class="karwaan-sig">KARWAAN · Where Poetry Finds Its Path</p>
    </div>
  `;

  requestAnimationFrame(() => {
    const card = document.getElementById('bloom-card-wrap');
    if (card) {
      document.documentElement.style.setProperty('--card-h',
        card.getBoundingClientRect().height + 'px');
    }
  });
  window.addEventListener('resize', () => {
    const card = document.getElementById('bloom-card-wrap');
    if (card) {
      document.documentElement.style.setProperty('--card-h',
        card.getBoundingClientRect().height + 'px');
    }
  });

  const flowerContainer = document.getElementById('bloom-flowers');
  flowerData.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'bloom-flower';
    div.style.cssText = `
      left:${f.xPct}%;
      top:${f.yPct}%;
      width:${f.sizePct}%;
      height:${f.sizePct}%;
      z-index:${f.zIndex};
      --frot:${f.rot}deg;
      transform: scale(0.3) rotate(${f.rot}deg);
    `;
    const img = document.createElement('img');
    img.src = f.src;
    img.alt = '';
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;';
    img.onerror = () => { div.style.display = 'none'; };
    div.appendChild(img);
    flowerContainer.appendChild(div);

    setTimeout(() => div.classList.add('appeared'), 900 + i * 90);
    if (i === flowerData.length - 1) {
      setTimeout(() => launchConfetti(), 900 + i * 90 + 400);
    }
  });

  initPetals(isDark);
}

  // Set card-h CSS variable after render so font sizes respond
  requestAnimationFrame(() => {
    const card = document.getElementById('bloom-card-wrap');
    if (card) {
      const h = card.getBoundingClientRect().height;
      document.documentElement.style.setProperty('--card-h', h + 'px');
    }
  });

  window.addEventListener('resize', () => {
    const card = document.getElementById('bloom-card-wrap');
    if (card) {
      document.documentElement.style.setProperty('--card-h',
        card.getBoundingClientRect().height + 'px');
    }
  });

  // Mount flowers
  const flowerContainer = document.getElementById('bloom-flowers');
  flowerData.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'bloom-flower';
    div.style.cssText = `
      left:${f.xPct}%;
      top:${f.yPct}%;
      width:${f.sizePct}%;
      height:${f.sizePct}%;
      z-index:${f.zIndex};
      --frot:${f.rot}deg;
      transform: scale(0.3) rotate(${f.rot}deg);
    `;
    const img = document.createElement('img');
    img.src = f.src;
    img.alt = '';
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;';
    img.onerror = () => { div.style.display = 'none'; };
    div.appendChild(img);
    flowerContainer.appendChild(div);

    // Stagger the bloom-in animation
    setTimeout(() => div.classList.add('appeared'), 900 + i * 90);

    // Fire confetti after the last flower blooms in
    if (i === flowerData.length - 1) {
      setTimeout(() => launchConfetti(), 900 + i * 90 + 400);
    }
  });

  // Petals
  initPetals(isDark);
}

/* ─── ERROR PAGE ─── */
function buildError() {
  const page = document.getElementById('page');
  page.innerHTML = `
    <div class="bloom-error">
      <h2>No bloom found ✦</h2>
      <p>This link may be broken or expired.<br>Try asking for a fresh one.</p>
      <a class="btn-create" href="index.html" style="margin-top:0.5rem"><span>Create Your Bloom</span></a>
    </div>
  `;
  initPetals(false);
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ─── CONFETTI ─── */
function launchConfetti() {
  const cv  = document.getElementById('confetti-canvas');
  if (!cv) return;
  const ctx = cv.getContext('2d');

  cv.width  = innerWidth;
  cv.height = innerHeight;

  // Palette matches KARWAAN's botanical theme
  const COLS = [
    '#EAD7D7', '#E6E0F2', '#DDE6E1', '#F5DDD5',
    '#c9b8d8', '#b8d4c4', '#e8c4b8', '#d4c8e8',
    '#F7C5C5', '#C5E0D4',
  ];

  const SHAPES = ['rect', 'circle', 'petal'];

  class Piece {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x     = Math.random() * cv.width;
      this.y     = initial ? Math.random() * cv.height * 0.4 - cv.height * 0.4 : -14;
      this.r     = 4 + Math.random() * 7;
      this.vx    = (Math.random() - .5) * 3.5;
      this.vy    = 2.2 + Math.random() * 3.5;
      this.rot   = Math.random() * Math.PI * 2;
      this.vr    = (Math.random() - .5) * 0.12;
      this.col   = COLS[Math.floor(Math.random() * COLS.length)];
      this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = 0.05 + Math.random() * 0.05;
      this.alpha = 0.85 + Math.random() * 0.15;
      this.decay = 0.991 + Math.random() * 0.007;
    }
    tick() {
      this.wobble += this.wobbleSpeed;
      this.x  += this.vx + Math.sin(this.wobble) * 0.8;
      this.y  += this.vy;
      this.rot += this.vr;
      this.vy *= this.decay;
      this.alpha -= 0.004;
      if (this.y > cv.height + 20 || this.alpha <= 0) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillStyle = this.col;
      if (this.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, this.r * 0.7, 0, Math.PI * 2);
        ctx.fill();
      } else if (this.shape === 'petal') {
        ctx.beginPath();
        ctx.ellipse(0, 0, this.r, this.r * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-this.r * 0.5, -this.r * 0.35, this.r, this.r * 0.7);
      }
      ctx.restore();
    }
  }

  // Burst: 120 pieces, all starting near top
  const pieces = Array.from({ length: 120 }, () => new Piece());
  let frame = 0;
  const MAX_FRAMES = 260; // ~4.3s at 60fps then fades out

  (function loop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    pieces.forEach(p => { p.tick(); p.draw(); });
    frame++;
    if (frame < MAX_FRAMES) {
      requestAnimationFrame(loop);
    } else {
      // Fade out canvas
      let a = 1;
      (function fade() {
        a -= 0.06;
        cv.style.opacity = Math.max(0, a);
        if (a > 0) requestAnimationFrame(fade);
        else ctx.clearRect(0, 0, cv.width, cv.height);
      })();
    }
  })();

  addEventListener('resize', () => {
    cv.width  = innerWidth;
    cv.height = innerHeight;
  });
}

/* ─── BOOT ─── */
document.addEventListener('DOMContentLoaded', () => {
  const data = decodeBloom();
  if (data && (data.p || data.s)) {
    buildPage(data);
  } else {
    buildError();
  }
});
</script>
</body>
